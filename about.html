  <style>
    .about-section-sub {
      font-size: 1rem; line-height: 1.8; color: var(--text-muted);
      max-width: 680px; margin-bottom: 48px;
    }

    /* Rules list */
    .rules-list { display: flex; flex-direction: column; gap: 12px; list-style: none; }
    .rules-list li {
      display: flex; gap: 16px; align-items: flex-start;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 22px;
      transition: border-color var(--t), background var(--t);
    }
    .rules-list li:hover { border-color: var(--border-md); background: var(--bg-card-hv); }
    .rule-num {
      font-family: var(--font-d); font-size: 1.5rem;
      letter-spacing: 0.05em; color: var(--text-dim);
      flex-shrink: 0; line-height: 1.2; width: 28px;
    }
    .rule-text { font-size: 0.93rem; line-height: 1.7; }
    .rule-text strong { color: var(--text); font-weight: 700; }

    /* Timeline */
    .timeline { display: flex; flex-direction: column; gap: 0; position: relative; }
    .timeline::before {
      content: ''; position: absolute;
      left: 18px; top: 10px; bottom: 10px; width: 1px;
      background: linear-gradient(180deg, var(--sylvans), var(--cpfc));
      opacity: 0.3;
    }
    .timeline-item {
      display: flex; gap: 28px; align-items: flex-start;
      padding: 22px 0; position: relative;
    }
    .timeline-dot {
      width: 36px; height: 36px; border-radius: 50%;
      flex-shrink: 0; display: flex; align-items: center;
      justify-content: center; font-size: 0.8rem; font-weight: 700;
      position: relative; z-index: 1;
    }
    .timeline-dot--syl  { background: rgba(230,48,48,0.15); border: 1px solid var(--sylvans); color: var(--sylvans); }
    .timeline-dot--cpfc { background: rgba(26,109,212,0.15); border: 1px solid var(--cpfc);   color: var(--cpfc);   }
    .timeline-dot--rll  { background: rgba(255,255,255,0.07); border: 1px solid var(--border-md); }
    .timeline-content { padding-top: 4px; }
    .timeline-title { font-weight: 700; margin-bottom: 4px; }
    .timeline-desc  { font-size: 0.88rem; color: var(--text-muted); line-height: 1.65; }
  </style>
</head>
